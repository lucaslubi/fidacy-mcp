<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <!-- Fidacy skill demo: legit invoice ALLOW, then the SAME invoice re-presented
       (classic BEC) DENIED at any amount. SMIL 14s loop, plays inline on ClawHub/GitHub. -->
  <rect x="0" y="0" width="760" height="420" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="759" height="419" fill="none" stroke="#0a0a0a"/>

  <!-- title bar -->
  <rect x="0" y="0" width="760" height="34" fill="#0a0a0a"/>
  <text x="16" y="22" font-size="13" fill="#ffffff">fidacy-payment-firewall — skill</text>
  <text x="744" y="22" font-size="12" fill="#9ca3af" text-anchor="end">use BEFORE any payment tool call</text>

  <!-- ══ scene 1: first payment of the invoice — ALLOW ══ -->
  <g>
    <animate attributeName="opacity" calcMode="discrete" values="0;1;0" keyTimes="0;0.036;0.464" dur="14s" repeatCount="indefinite"/>
    <text x="16" y="64" font-size="13" fill="#6b7280">▸ inbox: Invoice INV-7231 “ACME Supplies” — EUR 1,840.00</text>
    <text x="16" y="96" font-size="13" fill="#0a0a0a">agent: settling INV-7231 → payee acme-supplies  EUR 1,840.00</text>
  </g>
  <g>
    <animate attributeName="opacity" calcMode="discrete" values="0;1;0" keyTimes="0;0.107;0.464" dur="14s" repeatCount="indefinite"/>
    <text x="16" y="128" font-size="13" fill="#0000f2">→ request_payment { payee: "acme-supplies", amount: 1840, invoiceRef: "INV-7231" }</text>
  </g>
  <g>
    <animate attributeName="opacity" calcMode="discrete" values="0;1;0" keyTimes="0;0.2;0.464" dur="14s" repeatCount="indefinite"/>
    <rect x="16" y="148" width="728" height="78" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="32" y="174" font-size="14" fill="#16a34a" font-weight="bold">✔ ALLOW — Ed25519 grant issued (single-use, short-lived)</text>
    <text x="32" y="196" font-size="13" fill="#0a0a0a">grant: eyJhbGciOiJFZERTQSJ9.eyJkZWNpc2lvbklkIjoi…  → executor settles INV-7231</text>
    <text x="32" y="216" font-size="12" fill="#6b7280">invoice INV-7231 is now bound to this payment — one payment per invoice</text>
  </g>

  <!-- ══ scene 2: same invoice re-presented (BEC) — DENY ══ -->
  <g>
    <animate attributeName="opacity" calcMode="discrete" values="0;1;0" keyTimes="0;0.5;0.964" dur="14s" repeatCount="indefinite"/>
    <text x="16" y="64" font-size="13" fill="#6b7280">▸ inbox: “URGENT — updated wire for INV-7231, resend EUR 2,140.00” <tspan fill="#dc2626">(BEC re-present)</tspan></text>
    <text x="16" y="96" font-size="13" fill="#0a0a0a">agent: settling INV-7231 again → payee acme-supplies  <tspan fill="#dc2626">EUR 2,140.00</tspan></text>
  </g>
  <g>
    <animate attributeName="opacity" calcMode="discrete" values="0;1;0" keyTimes="0;0.571;0.964" dur="14s" repeatCount="indefinite"/>
    <text x="16" y="128" font-size="13" fill="#0000f2">→ request_payment { payee: "acme-supplies", amount: 2140, invoiceRef: "INV-7231" }</text>
  </g>
  <g>
    <animate attributeName="opacity" calcMode="discrete" values="0;1;0" keyTimes="0;0.664;0.964" dur="14s" repeatCount="indefinite"/>
    <rect x="16" y="148" width="728" height="78" fill="#fef2f2" stroke="#dc2626"/>
    <text x="32" y="174" font-size="14" fill="#dc2626" font-weight="bold">✖ DENY — duplicate_invoice: INV-7231 was already paid</text>
    <text x="32" y="196" font-size="13" fill="#0a0a0a">blocked at ANY amount, any case/spacing tweak — no grant, payment dead on arrival</text>
    <text x="32" y="216" font-size="12" fill="#6b7280">denial recorded: tamper-evident hash-chained audit · get_audit_proof(decisionId)</text>
  </g>
  <g>
    <animate attributeName="opacity" calcMode="discrete" values="0;1;0" keyTimes="0;0.764;0.964" dur="14s" repeatCount="indefinite"/>
    <text x="16" y="256" font-size="13" fill="#0000f2">every verdict is signed — anyone verifies it, no trust in Fidacy required:</text>
    <text x="16" y="276" font-size="13" fill="#0a0a0a">https://api.fidacy.com/.well-known/jwks.json</text>
  </g>

  <!-- static footer -->
  <line x1="16" y1="304" x2="744" y2="304" stroke="#e5e7eb"/>
  <text x="16" y="332" font-size="13" fill="#0a0a0a">ALLOW → signed grant the executor requires · DENY → never pay, report the rule</text>
  <text x="16" y="356" font-size="13" fill="#6b7280">deny-by-default · local-first · non-custodial — Fidacy authorizes, it never holds funds</text>
  <text x="16" y="392" font-size="13" fill="#0000f2">works via @fidacy/mcp (any MCP host) or the native plugin: openclaw plugins install @fidacy/openclaw-plugin</text>
</svg>
